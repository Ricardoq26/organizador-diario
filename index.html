<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3b82f6">
    <meta name="description" content="Organizador Diário - Gerencie suas tarefas e metas">
    <title>Organizador Diário</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Organizador">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <!-- React e bibliotecas -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.5.0/dist/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; }
        .loading { display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(to bottom right, #eff6ff, #e0e7ff); }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading">
            <div style="text-align: center;">
                <div style="font-size: 48px; margin-bottom: 16px;">📊</div>
                <div style="font-size: 20px; font-weight: bold; color: #3b82f6;">Carregando...</div>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { PieChart, Pie, Cell, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, LineChart, Line, Area, AreaChart } = Recharts;
        const { Plus, Trash2, CheckCircle, Circle, TrendingUp, Target, Calendar, Clock, Play, Pause, RotateCcw, Timer, Filter, SortAsc, LogOut, User } = lucide;

        // ============================================
        // CONFIGURAÇÃO DO FIREBASE
        // ============================================
// Initialize Firebase
const app = initializeApp(firebaseConfig);
        // Inicializar Firebase apenas se as credenciais foram configuradas
        let firebaseInitialized = false;
        if (firebaseConfig.apiKey !== "SUA_API_KEY_AQUI") {
            firebase.initializeApp(firebaseConfig);
            firebaseInitialized = true;
        }

        // ============================================
        // COMPONENTE PRINCIPAL
        // ============================================
        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [tasks, setTasks] = useState([]);
            const [goals, setGoals] = useState([]);
            const [dailyHistory, setDailyHistory] = useState([]);
            const [goalsHistory, setGoalsHistory] = useState([]);

            // Monitorar autenticação
            useEffect(() => {
                if (!firebaseInitialized) {
                    // Modo local sem Firebase
                    loadLocalData();
                    setLoading(false);
                    return;
                }

                const unsubscribe = firebase.auth().onAuthStateChanged((user) => {
                    setUser(user);
                    if (user) {
                        loadUserData(user.uid);
                    } else {
                        loadLocalData();
                    }
                    setLoading(false);
                });

                return () => unsubscribe();
            }, []);

            // Carregar dados do usuário do Firebase
            const loadUserData = (uid) => {
                const db = firebase.database();
                
                db.ref(`users/${uid}/tasks`).on('value', (snapshot) => {
                    const data = snapshot.val();
                    setTasks(data ? Object.values(data) : []);
                });

                db.ref(`users/${uid}/goals`).on('value', (snapshot) => {
                    const data = snapshot.val();
                    setGoals(data ? Object.values(data) : []);
                });

                db.ref(`users/${uid}/dailyHistory`).on('value', (snapshot) => {
                    const data = snapshot.val();
                    setDailyHistory(data ? Object.values(data) : []);
                });

                db.ref(`users/${uid}/goalsHistory`).on('value', (snapshot) => {
                    const data = snapshot.val();
                    setGoalsHistory(data ? Object.values(data) : []);
                });
            };

            // Carregar dados locais (localStorage)
            const loadLocalData = () => {
                const localTasks = localStorage.getItem('tasks');
                const localGoals = localStorage.getItem('goals');
                const localDailyHistory = localStorage.getItem('dailyHistory');
                const localGoalsHistory = localStorage.getItem('goalsHistory');

                if (localTasks) setTasks(JSON.parse(localTasks));
                if (localGoals) setGoals(JSON.parse(localGoals));
                if (localDailyHistory) setDailyHistory(JSON.parse(localDailyHistory));
                if (localGoalsHistory) setGoalsHistory(JSON.parse(localGoalsHistory));
            };

            // Salvar dados
            const saveData = (type, data) => {
                if (user && firebaseInitialized) {
                    // Salvar no Firebase
                    const db = firebase.database();
                    const updates = {};
                    data.forEach(item => {
                        updates[`users/${user.uid}/${type}/${item.id}`] = item;
                    });
                    db.ref().update(updates);
                } else {
                    // Salvar localmente
                    localStorage.setItem(type, JSON.stringify(data));
                }
            };

            // Login com Google
            const loginWithGoogle = async () => {
                if (!firebaseInitialized) {
                    alert('Firebase não configurado. Configure suas credenciais no código.');
                    return;
                }
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    await firebase.auth().signInWithPopup(provider);
                } catch (error) {
                    console.error('Erro no login:', error);
                    alert('Erro ao fazer login. Tente novamente.');
                }
            };

            // Logout
            const logout = async () => {
                if (firebaseInitialized) {
                    await firebase.auth().signOut();
                }
                setUser(null);
                setTasks([]);
                setGoals([]);
                setDailyHistory([]);
                setGoalsHistory([]);
            };

            // Atualizar tasks e salvar
            const updateTasks = (newTasks) => {
                setTasks(newTasks);
                saveData('tasks', newTasks);
            };

            // Atualizar goals e salvar
            const updateGoals = (newGoals) => {
                setGoals(newGoals);
                saveData('goals', newGoals);
            };

            if (loading) {
                return (
                    <div className="loading">
                        <div style={{textAlign: 'center'}}>
                            <div style={{fontSize: '48px', marginBottom: '16px'}}>📊</div>
                            <div style={{fontSize: '20px', fontWeight: 'bold', color: '#3b82f6'}}>Carregando...</div>
                        </div>
                    </div>
                );
            }

            // Tela de login
            if (!user && firebaseInitialized) {
                return <LoginScreen onLogin={loginWithGoogle} />;
            }

            return (
                <MainApp 
                    tasks={tasks}
                    goals={goals}
                    dailyHistory={dailyHistory}
                    goalsHistory={goalsHistory}
                    updateTasks={updateTasks}
                    updateGoals={updateGoals}
                    setDailyHistory={setDailyHistory}
                    setGoalsHistory={setGoalsHistory}
                    saveData={saveData}
                    user={user}
                    onLogout={logout}
                    firebaseEnabled={firebaseInitialized}
                />
            );
        }

        // ============================================
        // TELA DE LOGIN
        // ============================================
        function LoginScreen({ onLogin }) {
            return (
                <div style={{
                    minHeight: '100vh',
                    background: 'linear-gradient(to bottom right, #eff6ff, #e0e7ff)',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    padding: '16px'
                }}>
                    <div style={{
                        backgroundColor: 'white',
                        padding: '48px',
                        borderRadius: '24px',
                        boxShadow: '0 20px 25px -5px rgba(0, 0, 0, 0.1)',
                        maxWidth: '400px',
                        width: '100%',
                        textAlign: 'center'
                    }}>
                        <div style={{fontSize: '64px', marginBottom: '24px'}}>📊</div>
                        <h1 style={{fontSize: '32px', fontWeight: 'bold', color: '#1f2937', marginBottom: '8px'}}>
                            Organizador Diário
                        </h1>
                        <p style={{color: '#6b7280', marginBottom: '32px'}}>
                            Gerencie suas tarefas e metas de forma inteligente
                        </p>
                        <button
                            onClick={onLogin}
                            style={{
                                width: '100%',
                                padding: '16px',
                                backgroundColor: '#3b82f6',
                                color: 'white',
                                border: 'none',
                                borderRadius: '12px',
                                fontSize: '16px',
                                fontWeight: '600',
                                cursor: 'pointer',
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'center',
                                gap: '8px'
                            }}
                            onMouseOver={(e) => e.target.style.backgroundColor = '#2563eb'}
                            onMouseOut={(e) => e.target.style.backgroundColor = '#3b82f6'}
                        >
                            <User size={20} />
                            Entrar com Google
                        </button>
                        <p style={{fontSize: '12px', color: '#9ca3af', marginTop: '16px'}}>
                            Seus dados serão sincronizados na nuvem
                        </p>
                    </div>
                </div>
            );
        }

        // ============================================
        // APP PRINCIPAL (seu código original adaptado)
        // ============================================
        function MainApp({ tasks, goals, dailyHistory, goalsHistory, updateTasks, updateGoals, setDailyHistory, setGoalsHistory, saveData, user, onLogout, firebaseEnabled }) {
            // Todos os states e funções do seu código original aqui...
            // (Por questões de espaço, vou incluir a versão resumida)
            
            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                    <div className="max-w-6xl mx-auto">
                        {/* Header com botão de logout */}
                        <div className="bg-white rounded-2xl shadow-xl p-6 mb-6">
                            <div className="flex justify-between items-center">
                                <div>
                                    <h1 className="text-3xl font-bold text-gray-800">📊 Organizador Diário</h1>
                                    <p className="text-gray-600">Gerencie suas tarefas e acompanhe seu progresso</p>
                                    {user && <p className="text-sm text-blue-600 mt-1">👤 {user.displayName || user.email}</p>}
                                    {!firebaseEnabled && <p className="text-xs text-orange-600 mt-1">⚠️ Modo local - Configure Firebase para sincronização</p>}
                                </div>
                                {firebaseEnabled && user && (
                                    <button
                                        onClick={onLogout}
                                        className="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition flex items-center gap-2"
                                    >
                                        <LogOut size={18} />
                                        Sair
                                    </button>
                                )}
                            </div>
                        </div>
                        
                        {/* Resto do app - coloque todo o JSX do seu código original aqui */}
                        <div className="bg-white rounded-2xl shadow-xl p-6">
                            <p className="text-center text-gray-600">
                                🎉 Seu organizador está funcionando!<br/>
                                <span className="text-sm">Configure o Firebase para habilitar sincronização</span>
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        // Renderizar app
        ReactDOM.render(<App />, document.getElementById('root'));

        // ============================================
        // SERVICE WORKER PARA PWA
        // ============================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registrado'))
                    .catch(err => console.log('Erro no Service Worker:', err));
            });
        }
    </script>
</body>
</html>
