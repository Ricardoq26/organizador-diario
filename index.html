<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3b82f6">
    <title>Organizador Diário</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase v9 (modular) -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getDatabase, ref, set, onValue, remove } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
        
        // CONFIGURAÇÃO DO FIREBASE
        // IMPORTANTE: Substitua com suas credenciais
   // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyDVnOlX8OMKFAu2XF0exF-0_btN-7hHTBQ",
  authDomain: "meu-organizador-diario.firebaseapp.com",
  databaseURL: "https://meu-organizador-diario-default-rtdb.firebaseio.com",
  projectId: "meu-organizador-diario",
  storageBucket: "meu-organizador-diario.firebasestorage.app",
  messagingSenderId: "107242198508",
  appId: "1:107242198508:web:0f4dcb4f286afe07589cc9"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);

        const firebaseEnabled = firebaseConfig.apiKey !== "SUA_API_KEY_AQUI";
        let app, auth, db;

        if (firebaseEnabled) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getDatabase(app);
        }

        // Estado global
        let currentUser = null;
        let tasks = [];
        let goals = [];

        // Função para salvar no localStorage
        function saveToLocal(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }

        // Função para carregar do localStorage
        function loadFromLocal(key) {
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : [];
        }

        // Salvar tarefas
        function saveTasks(newTasks) {
            tasks = newTasks;
            saveToLocal('tasks', tasks);
            if (firebaseEnabled && currentUser) {
                tasks.forEach(task => {
                    set(ref(db, `users/${currentUser.uid}/tasks/${task.id}`), task);
                });
            }
            renderApp();
        }

        // Salvar metas
        function saveGoals(newGoals) {
            goals = newGoals;
            saveToLocal('goals', goals);
            if (firebaseEnabled && currentUser) {
                goals.forEach(goal => {
                    set(ref(db, `users/${currentUser.uid}/goals/${goal.id}`), goal);
                });
            }
            renderApp();
        }

        // Login com Google
        async function loginWithGoogle() {
            if (!firebaseEnabled) {
                alert('Firebase não configurado. Usando modo local.');
                currentUser = { displayName: 'Usuário Local', email: 'local@example.com' };
                renderApp();
                return;
            }
            try {
                const provider = new GoogleAuthProvider();
                const result = await signInWithPopup(auth, provider);
                currentUser = result.user;
            } catch (error) {
                console.error('Erro no login:', error);
                alert('Erro ao fazer login. Usando modo local.');
                currentUser = { displayName: 'Usuário Local', email: 'local@example.com' };
            }
            renderApp();
        }

        // Logout
        async function doLogout() {
            if (firebaseEnabled && auth) {
                await signOut(auth);
            }
            currentUser = null;
            tasks = [];
            goals = [];
            renderApp();
        }

        // Adicionar tarefa
        function addTask(text, category, priority, recurring) {
            const newTask = {
                id: Date.now(),
                text,
                category,
                priority,
                recurring,
                completed: false,
                dailyChecks: {},
                createdAt: new Date().toLocaleDateString('pt-BR')
            };
            saveTasks([...tasks, newTask]);
        }

        // Adicionar meta
        function addGoal(text, category, deadline) {
            const newGoal = {
                id: Date.now(),
                text,
                category,
                deadline,
                completed: false,
                createdAt: new Date().toLocaleDateString('pt-BR')
            };
            saveGoals([...goals, newGoal]);
        }

        // Toggle tarefa
        function toggleTask(id) {
            const today = new Date().toLocaleDateString('pt-BR');
            const newTasks = tasks.map(t => {
                if (t.id === id) {
                    if (t.recurring) {
                        const dailyChecks = { ...t.dailyChecks };
                        dailyChecks[today] = !dailyChecks[today];
                        return { ...t, dailyChecks };
                    }
                    return { ...t, completed: !t.completed };
                }
                return t;
            });
            saveTasks(newTasks);
        }

        // Toggle meta
        function toggleGoal(id) {
            const newGoals = goals.map(g => 
                g.id === id ? { ...g, completed: !g.completed } : g
            );
            saveGoals(newGoals);
        }

        // Deletar tarefa
        function deleteTask(id) {
            if (confirm('Deseja realmente excluir esta tarefa?')) {
                saveTasks(tasks.filter(t => t.id !== id));
                if (firebaseEnabled && currentUser) {
                    remove(ref(db, `users/${currentUser.uid}/tasks/${id}`));
                }
            }
        }

        // Deletar meta
        function deleteGoal(id) {
            if (confirm('Deseja realmente excluir esta meta?')) {
                saveGoals(goals.filter(g => g.id !== id));
                if (firebaseEnabled && currentUser) {
                    remove(ref(db, `users/${currentUser.uid}/goals/${id}`));
                }
            }
        }

        // Renderizar app
        function renderApp() {
            const root = document.getElementById('root');
            
            if (!currentUser) {
                root.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
                        <div class="bg-white p-12 rounded-3xl shadow-2xl max-w-md w-full text-center">
                            <div class="text-6xl mb-6">📊</div>
                            <h1 class="text-3xl font-bold text-gray-800 mb-2">Organizador Diário</h1>
                            <p class="text-gray-600 mb-8">Gerencie suas tarefas e metas</p>
                            <button onclick="window.loginWithGoogle()" class="w-full bg-blue-600 text-white py-4 px-6 rounded-xl font-semibold hover:bg-blue-700 transition">
                                ${firebaseEnabled ? '🔐 Entrar com Google' : '📝 Usar Modo Local'}
                            </button>
                            ${!firebaseEnabled ? '<p class="text-xs text-orange-600 mt-4">⚠️ Configure Firebase para sincronização</p>' : ''}
                        </div>
                    </div>
                `;
                return;
            }

            const today = new Date().toLocaleDateString('pt-BR');
            const completedTasks = tasks.filter(t => {
                if (t.recurring) return t.dailyChecks[today];
                return t.completed;
            }).length;

            root.innerHTML = `
                <div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                    <div class="max-w-6xl mx-auto">
                        <!-- Header -->
                        <div class="bg-white rounded-2xl shadow-xl p-6 mb-6">
                            <div class="flex justify-between items-center">
                                <div>
                                    <h1 class="text-3xl font-bold text-gray-800">📊 Organizador Diário</h1>
                                    <p class="text-gray-600">Olá, ${currentUser.displayName || currentUser.email}!</p>
                                    <p class="text-sm text-blue-600">${today}</p>
                                </div>
                                <button onclick="window.doLogout()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Sair</button>
                            </div>
                        </div>

                        <!-- Stats -->
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                            <div class="bg-white rounded-xl shadow p-4">
                                <div class="text-sm text-gray-600">Total Tarefas</div>
                                <div class="text-2xl font-bold text-blue-600">${tasks.length}</div>
                            </div>
                            <div class="bg-white rounded-xl shadow p-4">
                                <div class="text-sm text-gray-600">Concluídas Hoje</div>
                                <div class="text-2xl font-bold text-green-600">${completedTasks}</div>
                            </div>
                            <div class="bg-white rounded-xl shadow p-4">
                                <div class="text-sm text-gray-600">Total Metas</div>
                                <div class="text-2xl font-bold text-purple-600">${goals.length}</div>
                            </div>
                            <div class="bg-white rounded-xl shadow p-4">
                                <div class="text-sm text-gray-600">Metas Concluídas</div>
                                <div class="text-2xl font-bold text-pink-600">${goals.filter(g => g.completed).length}</div>
                            </div>
                        </div>

                        <!-- Adicionar Tarefa -->
                        <div class="bg-white rounded-2xl shadow-xl p-6 mb-6">
                            <h2 class="text-xl font-semibold mb-4">➕ Adicionar Tarefa</h2>
                            <div class="flex gap-3 flex-wrap">
                                <input id="taskInput" type="text" placeholder="Nova tarefa..." class="flex-1 px-4 py-2 border rounded-lg min-w-[200px]">
                                <select id="taskCategory" class="px-4 py-2 border rounded-lg">
                                    <option>Trabalho</option>
                                    <option>Pessoal</option>
                                    <option>Estudos</option>
                                    <option>Saúde</option>
                                    <option>Lazer</option>
                                </select>
                                <select id="taskPriority" class="px-4 py-2 border rounded-lg">
                                    <option>Alta</option>
                                    <option selected>Média</option>
                                    <option>Baixa</option>
                                </select>
                                <label class="flex items-center gap-2 px-4 py-2 border rounded-lg cursor-pointer">
                                    <input id="taskRecurring" type="checkbox">
                                    <span class="text-sm">🔄 Diária</span>
                                </label>
                                <button onclick="window.handleAddTask()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Adicionar</button>
                            </div>
                        </div>

                        <!-- Lista de Tarefas -->
                        <div class="bg-white rounded-2xl shadow-xl p-6 mb-6">
                            <h2 class="text-xl font-semibold mb-4">📝 Minhas Tarefas</h2>
                            <div class="space-y-3">
                                ${tasks.length === 0 ? '<p class="text-gray-500 text-center py-8">Nenhuma tarefa ainda.</p>' : 
                                  tasks.map(t => {
                                      const isCompleted = t.recurring ? t.dailyChecks[today] : t.completed;
                                      return `
                                          <div class="flex items-center gap-3 p-4 border rounded-lg ${isCompleted ? 'bg-gray-50' : 'bg-white'}">
                                              <button onclick="window.toggleTask(${t.id})" class="text-2xl">
                                                  ${isCompleted ? '✅' : '⭕'}
                                              </button>
                                              <div class="flex-1">
                                                  <div class="${isCompleted ? 'line-through text-gray-500' : 'text-gray-800'}">${t.text}</div>
                                                  <div class="text-xs text-gray-500 mt-1">
                                                      ${t.category} | ${t.priority} ${t.recurring ? '| 🔄 Diária' : ''}
                                                  </div>
                                              </div>
                                              <button onclick="window.deleteTask(${t.id})" class="text-red-600 hover:text-red-800">🗑️</button>
                                          </div>
                                      `;
                                  }).join('')
                                }
                            </div>
                        </div>

                        <!-- Adicionar Meta -->
                        <div class="bg-white rounded-2xl shadow-xl p-6 mb-6">
                            <h2 class="text-xl font-semibold mb-4">🎯 Adicionar Meta</h2>
                            <div class="flex gap-3 flex-wrap">
                                <input id="goalInput" type="text" placeholder="Nova meta..." class="flex-1 px-4 py-2 border rounded-lg min-w-[200px]">
                                <select id="goalCategory" class="px-4 py-2 border rounded-lg">
                                    <option>Trabalho</option>
                                    <option>Pessoal</option>
                                    <option>Estudos</option>
                                    <option>Saúde</option>
                                    <option>Lazer</option>
                                </select>
                                <input id="goalDeadline" type="date" class="px-4 py-2 border rounded-lg">
                                <button onclick="window.handleAddGoal()" class="px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">Adicionar</button>
                            </div>
                        </div>

                        <!-- Lista de Metas -->
                        <div class="bg-white rounded-2xl shadow-xl p-6">
                            <h2 class="text-xl font-semibold mb-4">🏆 Minhas Metas</h2>
                            <div class="space-y-3">
                                ${goals.length === 0 ? '<p class="text-gray-500 text-center py-8">Nenhuma meta ainda.</p>' :
                                  goals.map(g => `
                                      <div class="flex items-center gap-3 p-4 border rounded-lg ${g.completed ? 'bg-green-50' : 'bg-white'}">
                                          <button onclick="window.toggleGoal(${g.id})" class="text-2xl">
                                              ${g.completed ? '✅' : '🎯'}
                                          </button>
                                          <div class="flex-1">
                                              <div class="${g.completed ? 'line-through text-gray-500' : 'text-gray-800'}">${g.text}</div>
                                              <div class="text-xs text-gray-500 mt-1">
                                                  ${g.category} | 📅 ${new Date(g.deadline).toLocaleDateString('pt-BR')}
                                              </div>
                                          </div>
                                          <button onclick="window.deleteGoal(${g.id})" class="text-red-600 hover:text-red-800">🗑️</button>
                                      </div>
                                  `).join('')
                                }
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Handlers
        window.handleAddTask = function() {
            const text = document.getElementById('taskInput').value.trim();
            const category = document.getElementById('taskCategory').value;
            const priority = document.getElementById('taskPriority').value;
            const recurring = document.getElementById('taskRecurring').checked;
            
            if (text) {
                addTask(text, category, priority, recurring);
                document.getElementById('taskInput').value = '';
                document.getElementById('taskRecurring').checked = false;
            }
        };

        window.handleAddGoal = function() {
            const text = document.getElementById('goalInput').value.trim();
            const category = document.getElementById('goalCategory').value;
            const deadline = document.getElementById('goalDeadline').value;
            
            if (text && deadline) {
                addGoal(text, category, deadline);
                document.getElementById('goalInput').value = '';
                document.getElementById('goalDeadline').value = '';
            } else {
                alert('Preencha a meta e a data!');
            }
        };

        // Expor funções globalmente
        window.loginWithGoogle = loginWithGoogle;
        window.doLogout = doLogout;
        window.toggleTask = toggleTask;
        window.toggleGoal = toggleGoal;
        window.deleteTask = deleteTask;
        window.deleteGoal = deleteGoal;

        // Inicializar
        if (firebaseEnabled) {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    // Carregar dados do Firebase
                    onValue(ref(db, `users/${user.uid}/tasks`), (snapshot) => {
                        const data = snapshot.val();
                        if (data) tasks = Object.values(data);
                        renderApp();
                    });
                    onValue(ref(db, `users/${user.uid}/goals`), (snapshot) => {
                        const data = snapshot.val();
                        if (data) goals = Object.values(data);
                        renderApp();
                    });
                } else {
                    currentUser = null;
                    renderApp();
                }
            });
        } else {
            tasks = loadFromLocal('tasks');
            goals = loadFromLocal('goals');
            renderApp();
        }
    </script>
</head>
<body>
    <div id="root">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(to bottom right, #eff6ff, #e0e7ff);">
            <div style="text-align: center;">
                <div style="font-size: 48px; margin-bottom: 16px;">📊</div>
                <div style="font-size: 20px; font-weight: bold; color: #3b82f6;">Carregando...</div>
            </div>
        </div>
    </div>
</body>
</html>
